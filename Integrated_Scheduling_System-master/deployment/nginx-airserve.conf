# ==============================================================
# Nginx Configuration for AirServe
# Server: ay2526-tp-j.coding36.net
# ==============================================================
# USAGE:
#   1. Copy this file to /etc/nginx/sites-available/airserve
#   2. Create symlink: sudo ln -s /etc/nginx/sites-available/airserve /etc/nginx/sites-enabled/
#   3. Remove default: sudo rm /etc/nginx/sites-enabled/default
#   4. Test config:    sudo nginx -t
#   5. Reload:         sudo systemctl reload nginx
#   6. SSL:            sudo certbot --nginx -d ay2526-tp-j.coding36.net
# ==============================================================

server {
    listen 80;
    server_name ay2526-tp-j.coding36.net;

    # --- React Frontend (built static files) ---
    # Serve the React production build
    root /home/ay2526-tp-j/app/appointment_scheduling/frontend/build;
    index index.html;

    # React Router: serve index.html for all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Django API Backend (Gunicorn proxy) ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Django admin panel
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Static Files (collected by collectstatic) ---
    location /static/ {
        alias /home/ay2526-tp-j/app/appointment_scheduling/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Media Files (user uploads) ---
    location /media/ {
        alias /home/ay2526-tp-j/app/appointment_scheduling/media/;
        expires 7d;
    }

    # --- Security Headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- File Upload Limit (match Django's 10MB) ---
    client_max_body_size 10M;
}
